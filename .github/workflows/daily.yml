name: Daily Contribution

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make daily commit
        run: |
          git config user.email "rahulprakash7033@gmail.com"
          git config user.name "Rahul-curious"
          git commit --allow-empty -m "chore: daily activity $(date +'%Y-%m-%d')"
          git push
